name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # 👈 Upgraded to v5 for Node 24 support

      - name: Set up Node
        uses: actions/setup-node@v6  # 👈 Upgraded to v6 for Node 24 support
        with:
          node-version: 20  # Keep this at 20! This is your local project's version, which is perfect.
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
